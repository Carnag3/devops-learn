apiVersion: v1
kind: Pod
metadata:
  name: my-hostpath-pod
spec:
  containers:
  - name: writer
    image: busybox
    command: ["/bin/sh", "-c"]
    args:
      - |
        echo "Hello from hostPath!" > /host/data/hello.txt
        echo "Pod was here at: $(date)" >> /host/data/hello.txt
        sleep 3600
    volumeMounts:
    - name: host-data
      mountPath: /host/data
  volumes:
  - name: host-data
    hostPath:
      path: /tmp/hostpath-demo
      type: DirectoryOrCreate

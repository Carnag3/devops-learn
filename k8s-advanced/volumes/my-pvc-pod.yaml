apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: my-pvc
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: v1
kind: Pod
metadata:
  name: my-pvc-pod
spec:
  containers:
  - name: writer
    image: busybox
    command: ["sh", "-c", "echo 'Hello from PersistentVolume!' > /data/hello.txt && echo 'Created at: $(date)' >> /data/hello.txt && sleep 3600"]
    volumeMounts:
    - name: pvc-data
      mountPath: /data
  volumes:
  - name: pvc-data
    persistentVolumeClaim:
      claimName: my-pvc
